# configs/config.yaml

# =========================
# Global
# =========================
seed: 42
device: "cuda"                 # "cuda" or "cpu"
mode: "flow"                    # rgb | flow
exp_group: "exp"               # runs/<exp_group>/...
tag: ""                        # optional suffix

# =========================
# Paths
# =========================
data_root: "E:/dataset/SoccerNet/frames3s_eq2"
splits_dir: "E:/xg-twostream/data/splits"
runs_root: "E:/xg-twostream/runs"

# =========================
# Split (run once)
# =========================
split_seed: 42
split_ratio: [0.70, 0.15, 0.15]     # train / val / test
overwrite_splits: false

# =========================
# Input
# =========================
img_size: 224
frames_rgb: 15
flows_per_clip: 14
flow_file: "flow_comp.npy"

# =========================
# Model
# =========================
backbone: "resnet50"            # resnet18 | resnet50
backbone_pretrained: true
freeze_backbone: true           # MUST be true in your requirement

tcn_channels: 256
tcn_layers: 2
tcn_kernel_size: 3
dropout: 0.2

# =========================
# Train
# =========================
epochs: 15
lr: 1.0e-4
weight_decay: 2.0e-4
batch_size: 4
num_workers: 4
pin_memory: true
use_amp: true

# =========================
# Eval
# =========================
threshold: 0.5


